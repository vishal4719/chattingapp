# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - chatbackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: npm

      - name: Install, build, and prepare production package
        env:
          # Placeholders for `next build` only — runtime env comes from Azure App Settings.
          FRONTEND_URL: https://placeholder.example.com
          JWT_SECRET: build-placeholder-not-used-at-runtime
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          S3_REGION: us-east-1
          S3_BUCKET: build
          S3_ACCESS_KEY_ID: build
          S3_SECRET_ACCESS_KEY: build
          LIVEKIT_API_KEY: build
          LIVEKIT_API_SECRET: build
          LIVEKIT_URL: wss://build.example.com
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Verify deployment package
        run: |
          test -f package.json
          test -f server.ts
          test -d node_modules/tsx
          test -d .next
          echo "Deployment package OK"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          if-no-files-found: error
          path: |
            package.json
            package-lock.json
            server.ts
            next.config.ts
            tsconfig.json
            next-env.d.ts
            app
            lib
            prisma
            node_modules
            .next

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify downloaded package
        run: |
          ls -la
          test -f package.json
          test -d node_modules/tsx
          test -d .next

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FF8CF3EBA9C240F49439B7BF81492519 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1E599B8B7D104FD79FC15B833793ACF5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AEB04F074E644E378370F8852E8B77C7 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: chatbackend
          slot-name: Production
          package: .
          startup-command: npm start
